<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 App</title>
    <style>
        /* Общие стили в духе Формулы*/
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #15151e; /* Карбоновый темный цвет F1 */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Шапка приложения */
        .header {
            background-color: #1f1f27;
            padding: 15px;
            text-align: center;
            border-bottom: 3px solid #e10600; /* Фирменный красный цвет F1 */
            font-weight: bold;
            font-size: 20px;
            letter-spacing: 1px;
        }

        /* Контейнер для страниц */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 80px; /* Место под нижнее меню */
        }

        /* Стили самих страниц */
        .page {
            display: none; /* По умолчанию скрываем все страницы */
        }

        .page.active {
            display: block; /* Показываем только активную */
        }

        /* Карточка гонки */
        .race-card {
            background-color: #1f1f27;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid #e10600;
        }

        .race-card h3 {
            margin: 0 0 5px 0;
            color: #ffffff;
        }

        .race-card p {
            margin: 5px 0;
            color: #a0a0a5;
            font-size: 14px;
        }

        /* Нижняя панель вкладок (как на телефоне) */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 60px;
            background-color: #1f1f27;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #2f2f39;
        }

        .nav-item {
            color: #a0a0a5;
            text-decoration: none;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px;
        }

        .nav-item.active {
            color: #e10600; /* Активная вкладка становится красной */
            font-weight: bold;
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 2px;
        }

        .f1-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .f1-table th, .f1-table td {
            padding: 12px;
            text-align: left;
        }

        .f1-table tr {
         border-bottom: 1px solid #2f2f39;
        }

        .f1-table thead tr {
            border-bottom: 2px solid #e10600;
            color: #a0a0a5;
        }

        .drivers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(2800px, 1fr);
            gap: 15px;
            margin-top: 20px;
            padding: 10px;
        }

        .driver-card {
            background-color: #1f1f27;
            border-radius: 16px;
            border: 1px solid #2f2f39;
            border-top: 4px solid #e10600; /* Красная линия F1 сверху */
            padding: 20px;
            position: relative; /* Чтобы позиционировать номер на фоне */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 320px; /* Фиксированная высота для красивого квадрата */
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Эффект при наведении мышки на карточку */
        .driver-card:hover {
            transform: translateY(-5px);
            border-color: #e10600;
            box-shadow: 0 8px 20px rgba(225, 6, 0, 0.2);
        }

        .driver-bg-number {
            position: absolute;
            right: -10px;
            bottom: -20px;
            font-size: 140px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03); /* Едва заметный прозрачный номер */
            font-family: 'Impact', sans-serif;
            z-index: 1;
        }

        .driver-photo-container {
            width: 100%;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            background: linear-gradient(180deg, rgba(31,31,39,0) 0%, rgba(21,21,30,0.5) 100%);
            border-radius: 8px;
            z-index: 2;
        }

        /* Временный красивый силуэт-заглушка вместо фото */
        .driver-avatar-placeholder {
            font-size: 80px;
            margin-bottom: -10px;
        }

        /* Информация о пилоте */
        .driver-info {
            z-index: 2;
            margin-top: 15px;
        }

        .driver-info h3 {
            margin: 0;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .driver-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #2f2f39;
        }

        .driver-points-badge {
            background-color: #e10600;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

    </style>
</head>
<BODY>
    <!-- Шапка -->
    <div class="header">🏎️ FORMULA 1</div>

    <!-- Область контента, где переключаются страницы -->
    <div class="content">

        <!-- СТРАНИЦА 1: КАЛЕНДАРЬ -->
        <div id="page-calendar" class="page active">
            <h2>Расписание гонок</h2>
            <div id="calendar-list">
                <p>Загрузка данных из C++ сервера...</p>
            </div>
        </div>

        <!-- СТРАНИЦА 2: ТАБЛИЦЫ -->
        <div id="page-tables" class="page">
            <h2>Турнирная таблица</h2>
            <table class = "f1-table">
                <thead>
                    <tr>
                        <th>Позиция</th>
                        <th>Гонщик</th>
                        <th>Очки</th>
                    </tr>
                </thead>
                <tbody id="standings_table_body">
                    <tr>
                        <td colspan="3" style="text-align : center; color: #a0a0a5">
                            Загрузка таблицы из С++...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- СТРАНИЦА 3: ПИЛОТЫ -->
        <div id="page-drivers" class="page">
            <h2>Гонщики</h2>
            <div id="drivers-cards-container" class="drivers-grid">
                <p style="color: #a0a0a5;">Загрузка карточек пилотов...</p>
            </div>

    </div>

    <!-- Нижнее мобильное меню -->
    <nav class="nav-bar">
        <button class="nav-item active" onclick="switchPage('calendar', this)">
            <span class="nav-icon">📅</span>
            <span>Календарь</span>
        </button>
        <button class="nav-item" onclick="switchPage('tables', this)">
            <span class="nav-icon">🏆</span>
            <span>Таблицы</span>
        </button>
        <button class="nav-item" onclick="switchPage('drivers', this)">
            <span class="nav-icon">👤</span>
            <span>Пилоты</span>
        </button>
    </nav>

    <script>// Логика переключения страниц
        function switchPage(pageId, element) {
            // 1. Скрываем все страницы
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // 2. Снимаем выделение со всех кнопок меню
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            // 3. Показываем нужную страницу
            document.getElementById('page-' + pageId).classList.add('active');
            // 4. Выделяем нажатую кнопку красным цветом
            element.classList.add('active');
        }

        // ФУНКЦИЯ СВЯЗИ С C++ СЕРВЕРОМ
        // async означает, что функция асинхронная — она скачивает данные в фоне и не вешает браузер
        async function loadCalendar() {
            const calendarList = document.getElementById('calendar-list');

            try {
                // Посылаем сетевой запрос к нашему C++ серверу Crow на порт 18080
                // await заставляет программу подождать, пока данные летят по сети
                const response = await fetch('http://127.0.0.1:18080/api/calendar');

                // Переводим текстовый ответ сервера в удобный JSON-массив
                const races = await response.json();

                // Очищаем текст "Загрузка данных...", который был написан изначально
                calendarList.innerHTML = '';

                // Если сервер вернул пустой массив
                if (races.length === 0) {
                    calendarList.innerHTML = '<p>Гонки не найдены.</p>';
                    return;
                }

                // Циклом проходимся по каждой гонке, которую прислал C++
                races.forEach(race => {
                    // Создаем красивую HTML-карточку для гонки
                    const card = document.createElement('div');
                    card.className = 'race-card'; // Применяем наш трафарет стилей F1

                    // Заполняем карточку данными, которые отфильтровал наш C++ бэкенд
                    card.innerHTML = `
                        <h3>${race.name}</h3>
                        <p><strong>ID гонки:</strong> ${race.id}</p>
                        <p><strong>Страна проведения:</strong> 🏁 ${race.country}</p>
                        <p><strong>Дата старта уикенда:</strong> 📅 ${race.date}</p>
                    `;

                    // Добавляем готовую карточку на страницу в браузере
                    calendarList.appendChild(card);
                });
            }
            catch (error) {
                // Если C++ сервер выключен или произошел сбой сети
                console.error("Ошибка загрузки:", error);
                calendarList.innerHTML = `
                    <p style="color: #e10600; font-weight: bold;">
                        ❌ Не удалось подключиться к C++ серверу.
                    </p>
                    <p style="font-size: 14px; color: #a0a0a5;">
                        Убедись, что черное окно консоли в Visual Studio запущено.
                    </p>
                `;
            }
        }

        async function loadStandings() {
            const tableBody = document.getElementById('standings_table_body');

            try {
                // Посылаем запрос к нашему серверу
                const response = await fetch('http://127.0.0.1:18080/api/standings');
                // Переводим в JSON формат
                const drivers = await response.json();

                // Очищаем заглушку Загрузка данных
                tableBody.innerHTML = '';

                // Если сервер вернул пустой массив
                if (drivers.length === 0) {
                    tableBody.innerHTML = '<p>Результаты не найдены.</p>';
                    return;
                }

                // Счётчик позиций
                let position = 1;

                // Циклом проходимся по каждому гонщику
                drivers.forEach(driver => {
                    // Создаем карточку
                    const raw = document.createElement('tr');

                    //Заполянем карточку данными
                    raw.innerHTML = `
                    <td><b>${position}</b></td>
                    <td>${driver.full_name} (№${driver.number})</td>
                    <td>${driver.points}</td>
                    `;

                    // Добавляем готовую карточку на страницу
                    tableBody.appendChild(raw);
                    position++;
                })
            }
            catch (error) {
                console.error("Ошибка загрузки:", error);
                tableBody, innerHTML = `<tr><td colsplan="3" style="text-align: center; color: #e10600;">❌ Ошибка связи с C++</td></tr>`;
            }
        }

        async function loadDrivers() {
            const cardsDrivers = document.getElementById('drivers-cards-container');
            try {
                const response = await fetch('http://127.0.0.1:18080/api/standings')
                const drivers = await response.json();
                cardsDrivers.innerHTML = '';

                if (drivers.length === 0) {
                    cardsDrivers.innerHTML = '<p>Пилоты не найдены.</p>';
                    return;
                }

                // Циклом проходимся по каждому гонщику
                drivers.forEach(driver => {
                    // Создаем карточку
                    const card = document.createElement('div');
                    card.className = 'driver-card'; // Применяем наш новый красивый CSS-трафарет

                    //Заполянем карточку данными
                    card.innerHTML = `
                    <div class="driver-bg-number>#${driver.number}</div >
                        
                        <div class="driver-photo-container">
                                <span class="driver-avatar-placeholder">🏎️</span>
                        </div>

                        <div class="driver-info">
                            <h3>${driver.full_name}</h3>
                            <div class="driver-stats">
                                <span style="color: #a0a0a5;">Номер: <b>#${driver.number}</b></span>
                                <span class="driver-points-badge">${driver.points} PTS</span>
                            </div>
                        </div>
                    `;

                    // Добавляем готовую карточку на страницу
                    cardsDrivers.appendChild(card);
                })
            }
            catch (error) {
                console.error("Ошибка загрузки:", error);
                cardsDrivers, innerHTML = `<p style="color: #e10600;">❌ Не удалось загрузить карточки пилотов</p>`;
            }

        }

        // Запускаем загрузку календаря автоматически при открытии страницы
        window.onload = function () {
            loadCalendar(); // Запуск календаря
            loadStandings(); // Запуск таблицы
            loadDrivers(); // Запуск карточек пилотов
        };
    </script>
</BODY>
</HTML>
